services:
  app:
    build: .
    container_name: ai-exchange
    restart: unless-stopped

    # Expose port 8000 to host (will be reverse proxied by Caddy/Nginx)
    ports:
      - "8000:8000"

    # Connect to existing Caddy network (for reverse proxy)
    networks:
      - caddy_default

    # Load environment from backend/.env (matches deploy/docker-compose.yml
    # which uses env_file: against deploy/.env on the VPS). Both flows now
    # inject env vars via docker-compose rather than mounting the .env file —
    # pydantic-settings reads from os.environ as fallback, so this Just Works.
    env_file: ./backend/.env

    # Mount volumes for persistent data
    volumes:
      - ./data/db:/app/data/db
      - ./data/uploads:/app/data/uploads
      - ./data/logs:/app/data/logs

    labels:
      - "com.centurylinklabs.watchtower.enable=true"

    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  caddy_default:
    external: true
